<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Gemma 4 E2B QAT · WebGPU · py_shader_lang_wgpu</title>
<style>
  :root { color-scheme: dark; }
  body {
    font: 15px/1.5 -apple-system, system-ui, sans-serif;
    background: #111; color: #ddd;
    max-width: 760px; margin: 3rem auto; padding: 0 1rem;
  }
  h1 { font-size: 1.2rem; font-weight: 600; }
  h1 small { color: #888; font-weight: 400; }
  #barwrap { background: #222; border-radius: 4px; height: 6px; margin: .6rem 0; }
  #bar { background: #b57edc; border-radius: 4px; height: 6px; width: 0; transition: width .15s; }
  #status { color: #999; font-size: .85rem; min-height: 1.3em; }
  textarea {
    width: 100%; box-sizing: border-box; background: #1a1a1a; color: #eee;
    border: 1px solid #333; border-radius: 8px; padding: .7rem; font: inherit;
    resize: vertical; min-height: 4.5em;
  }
  button {
    background: #b57edc; color: #fff; border: 0; border-radius: 8px;
    padding: .55rem 1.4rem; font: inherit; font-weight: 600; cursor: pointer;
    margin-top: .5rem;
  }
  button:disabled { background: #333; color: #777; cursor: default; }
  #output {
    white-space: pre-wrap; background: #1a1a1a; border: 1px solid #333;
    border-radius: 8px; padding: .9rem; margin-top: 1rem; min-height: 6em;
  }
  #stats { color: #6fbf73; font-size: .85rem; margin-top: .4rem; }
  #cacheinfo { color: #999; font-size: .8rem; margin: .3rem 0 .6rem; min-height: 1.2em; }
  #clearcache {
    background: none; border: 1px solid #444; color: #aaa; border-radius: 6px;
    padding: .1rem .6rem; font-size: .78rem; font-weight: 400; margin: 0 0 0 .5rem;
    cursor: pointer;
  }
  #clearcache:hover { border-color: #888; color: #ddd; }
</style>
</head>
<body>
  <h1>Gemma 4 E2B QAT <small>— 4.6B params, int2/4/8 weights; every shader
  compiled from Python by py_shader_lang_wgpu, running in your browser's WebGPU</small></h1>
  <div id="barwrap"><div id="bar"></div></div>
  <div id="status">initializing…</div>
  <div id="cacheinfo"><span id="cachemsg"></span><button id="clearcache" hidden>clear cached weights</button></div>
  <textarea id="prompt">What is the capital of France?</textarea>
  <br>
  <button id="go" disabled>Generate</button>
  <div id="output"></div>
  <div id="stats"></div>
  <script type="module" src="/app.js"></script>
</body>
</html>
