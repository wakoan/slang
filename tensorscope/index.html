<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>tensorscope · Gemma 3 intermediate tensors</title>
<style>
  :root { color-scheme: dark; }
  body {
    font: 14px/1.45 -apple-system, system-ui, sans-serif;
    background: #111; color: #ddd; margin: 0; padding: 1.2rem;
  }
  h1 { font-size: 1.05rem; font-weight: 600; margin: 0 0 .2rem; }
  h1 small { color: #888; font-weight: 400; }
  a { color: #4a9eff; text-decoration: none; }
  #status { color: #999; font-size: .82rem; min-height: 1.2em; margin: .3rem 0 .6rem; }
  #controls { display: flex; gap: .5rem; align-items: flex-start; margin-bottom: .6rem; }
  textarea {
    flex: 1; background: #1a1a1a; color: #eee; border: 1px solid #333;
    border-radius: 8px; padding: .5rem .7rem; font: inherit; resize: vertical;
    min-height: 3em;
  }
  button {
    background: #4a9eff; color: #fff; border: 0; border-radius: 8px;
    padding: .5rem 1.1rem; font: inherit; font-weight: 600; cursor: pointer;
  }
  button:disabled { background: #333; color: #777; cursor: default; }
  #stepinfo { font-size: .85rem; color: #bbb; }
  #preds { font-size: .85rem; color: #6fbf73; margin: .2rem 0 .8rem; min-height: 1.2em; }
  #preds.partial { color: #997a3d; }
  #tokens { margin: 0 0 .6rem; line-height: 1.9; }
  .tok { display: inline-block; padding: .05rem .35rem; margin: 1px;
    background: #1a1a1a; border: 1px solid #333; border-radius: 5px;
    font: 11px ui-monospace, monospace; cursor: pointer; white-space: pre; }
  .tok:hover { border-color: #666; }
  .tok.sel { border-color: #4a9eff; color: #4a9eff; }
  .nav { background: #1a1a1a; color: #999; border: 1px solid #333; border-radius: 5px;
    padding: .05rem .45rem; font: 11px ui-monospace, monospace; margin-right: 3px;
    cursor: pointer; }
  .nav:hover { border-color: #666; color: #ddd; }
  #main { display: flex; gap: 1rem; }
  #side { width: 250px; flex-shrink: 0; }
  #diagctl { font-size: .8rem; color: #999; margin-bottom: .3rem; }
  #diaghint { color: #666; font-size: .72rem; }
  #diagram { background: #161616; border: 1px solid #333; border-radius: 8px;
    display: block; margin-bottom: .5rem; }
  #tensorlist {
    width: 240px; height: 240px; background: #1a1a1a; color: #ddd;
    border: 1px solid #333; border-radius: 8px; font: 12px/1.5 ui-monospace, monospace;
  }
  #viz { flex: 1; min-width: 0; }
  #vizcontrols { display: flex; gap: .8rem; align-items: center; margin-bottom: .5rem;
    font-size: .82rem; color: #999; }
  select { background: #1a1a1a; color: #ddd; border: 1px solid #333; border-radius: 6px;
    padding: .15rem .4rem; font: inherit; }
  #canvaswrap { overflow: auto; max-height: 620px; max-width: 100%;
    border: 1px solid #333; border-radius: 6px; background: #000; }
  #canvas { background: #000; display: block; image-rendering: pixelated; }
  #analytics { display: flex; gap: 1.2rem; align-items: flex-end; margin: .2rem 0 .4rem; }
  #legend, #hist { display: block; }
  #tooltip { font: 12px ui-monospace, monospace; color: #4a9eff; min-height: 1.3em; margin-top: .3rem; }
  #stats { font: 12px ui-monospace, monospace; color: #999; min-height: 1.3em; }
</style>
</head>
<body>
  <h1>tensorscope <small>— step through Gemma 3 one token at a time and inspect
  every intermediate tensor · <a href="/">back to generation demo</a></small></h1>
  <div id="status">initializing…</div>
  <div id="controls">
    <textarea id="prompt">Why is the sky blue?</textarea>
    <button id="tokenize" disabled>Tokenize / Reset</button>
    <button id="step" disabled>Step ▸</button>
    <button id="runprompt" disabled title="step through all remaining prompt tokens">Finish prompt ▸▸</button>
  </div>
  <div id="stepinfo"></div>
  <div id="preds"></div>
  <div id="tokens"><button id="prevtok" class="nav" title="previous step (←)">◀</button><button id="nexttok" class="nav" title="next step (→)">▶</button><span id="tokchips"></span></div>
  <div id="main">
    <div id="side">
      <div id="diagctl">layer <select id="layersel"></select>
        <span id="diaghint">σ per tensor · click to inspect</span></div>
      <svg id="diagram" width="240" height="508"></svg>
      <select id="tensorlist" size="2" multiple="false"></select>
    </div>
    <div id="viz">
      <div id="vizcontrols">
        width:
        <select id="widthsel">
          <option value="">auto</option>
          <option>8</option><option>16</option><option>32</option>
          <option>64</option><option>128</option><option>256</option><option>512</option>
        </select>
        scale:
        <select id="scalesel">
          <option value="symmetric">symmetric (blue·white·red)</option>
          <option value="minmax">min–max (grayscale)</option>
        </select>
        <span id="headctl" style="display:none">head:
        <select id="headsel"><option value="all">all</option></select></span>
        view:
        <select id="viewsel">
          <option value="step">selected token</option>
          <option value="seq">all tokens × features</option>
        </select>
        zoom:
        <select id="zoomsel">
          <option value="fit">fit (overview)</option>
          <option value="2">2 px</option>
          <option value="6">6 px</option>
          <option value="12">12 px</option>
          <option value="values">values (24 px + numbers)</option>
        </select>
      </div>
      <div id="analytics">
        <canvas id="legend" width="280" height="26"></canvas>
        <canvas id="hist" width="340" height="96" title="value distribution"></canvas>
      </div>
      <div id="canvaswrap"><canvas id="canvas" width="720" height="200"></canvas></div>
      <div id="tooltip"></div>
      <div id="stats"></div>
    </div>
  </div>
  <script type="module" src="/tensorscope.js"></script>
</body>
</html>
